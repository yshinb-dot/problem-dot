<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>HAN DOT · Problem dot</title>

<style>

body{
font-family:system-ui;
background:#f5f7fb;
margin:0;
padding:40px;
color:#0f172a;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
color:#64748b;
line-height:1.7;
margin-bottom:20px;
}

.step{
font-size:14px;
font-weight:700;
color:#64748b;
margin-bottom:10px;
}

.point-title{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.point-desc{
color:#64748b;
line-height:1.6;
margin-bottom:20px;
}

.question{
background:#020617;
color:white;
padding:18px;
border-radius:10px;
line-height:1.7;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:120px;
padding:14px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:15px;
line-height:1.6;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#020617;
color:white;
font-weight:600;
cursor:pointer;
margin-top:15px;
}

button.secondary{
background:#e2e8f0;
color:#0f172a;
}

.result{
background:#fef3c7;
padding:20px;
border-radius:10px;
line-height:1.7;
margin-top:15px;
}

.prompt{
background:#020617;
color:white;
padding:20px;
border-radius:10px;
margin-top:20px;
white-space:pre-wrap;
line-height:1.7;
}

.copy{
background:#f59e0b;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">HAN DOT · Problem dot</div>

<div class="subtitle">
Dream of Thinking<br>
생각을 억지로 밀어가지 않고<br>
생각이 꿈꾸도록 둔 뒤 그 흐름을 관찰합니다.
</div>

<textarea id="problemInput">
도서관에서 자리를 잡기 어렵다
</textarea>

<button onclick="start()">Problem dot 시작</button>

</div>


<div id="workspace"></div>

</div>


<script>

const steps = [

{
key:"imagination",
title:"point of imagination",
desc:"문제의 가정을 흔들어 보는 단계"
},

{
key:"observation",
title:"point of observation",
desc:"실제 상황을 관찰하는 단계"
},

{
key:"perspective",
title:"point of perspective",
desc:"다른 관점에서 바라보는 단계"
},

{
key:"connection",
title:"point of connection",
desc:"다른 상황과 연결해 보는 단계"
},

{
key:"transformation",
title:"point of transformation",
desc:"구조 변화를 상상하는 단계"
},

{
key:"constraint",
title:"point of constraint",
desc:"제약 조건을 탐색하는 단계"
},

{
key:"question",
title:"point of question",
desc:"핵심 질문을 찾는 단계"
},

{
key:"discovery",
title:"problem discovery point",
desc:"Problem dot을 정리하는 단계"
}

]

let stepIndex=0
let answers={}
let problem=""

async function start(){

problem=document.getElementById("problemInput").value

stepIndex=0
answers={}

nextStep()

}

async function nextStep(){

if(stepIndex>=steps.length){
showResult()
return
}

const step=steps[stepIndex]

const questions=await fetchQuestions(step.key)

const q=questions[Math.floor(Math.random()*questions.length)]

renderStep(step,q)

}

async function fetchQuestions(step){

const res=await fetch("/api/questions",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

problem:problem,

previous_answers:answers,

step:step

})

})

const data=await res.json()

return data.questions

}

function renderStep(step,question){

const html=`

<div class="card">

<div class="step">
STEP ${stepIndex+1} / ${steps.length}
</div>

<div class="point-title">
${step.title}
</div>

<div class="point-desc">
${step.desc}
</div>

<div class="question">
${question}
</div>

<textarea id="thinking"></textarea>

<button onclick="saveAnswer()">다음</button>

</div>

`

document.getElementById("workspace").innerHTML=html

}

function saveAnswer(){

const text=document.getElementById("thinking").value

answers[steps[stepIndex].key]=text

stepIndex++

nextStep()

}

function showResult(){

const problemDot=answers.discovery || ""

const prompt=

`다음 문제를 해결할 아이디어를 제안해줘.

처음 문제:
${problem}

Problem dot:
${problemDot}

사고 과정:
${JSON.stringify(answers,null,2)}
`

const html=`

<div class="card">

<div class="title">
Problem dot
</div>

<div class="result">
${problemDot}
</div>

<div class="title" style="margin-top:20px">
AI Prompt
</div>

<div class="prompt" id="promptText">
${prompt}
</div>

<button class="copy" onclick="copyPrompt()">Copy Prompt</button>

</div>

`

document.getElementById("workspace").innerHTML=html

}

function copyPrompt(){

const text=document.getElementById("promptText").innerText

navigator.clipboard.writeText(text)

alert("Prompt copied!")

}

</script>

</body>
</html>
